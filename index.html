<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><title>Baseball Program</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#111;color:#f0f0ec;padding-bottom:60px}
.hd{background:#1c1c1a;border-bottom:1px solid #2a2a28;padding:12px 14px 0;position:sticky;top:0;z-index:99}
.hd h1{font-size:17px;font-weight:700;margin-bottom:10px}
.vtabs{display:flex;gap:2px;border-bottom:1px solid #2a2a28;overflow-x:auto;scrollbar-width:none}
.vtabs::-webkit-scrollbar{display:none}
.vt{flex:0 0 auto;font-size:13px;font-weight:600;padding:8px 12px 10px;border:none;background:0;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.vt.on{color:#5fa0e8;border-bottom-color:#5fa0e8}
.ws{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;background:#1c1c1a;border-bottom:1px solid #2a2a28;scrollbar-width:none}
.ws::-webkit-scrollbar{display:none}
.wb{flex-shrink:0;font-size:12px;font-weight:700;padding:5px 13px;border-radius:99px;border:1px solid #3a3a38;background:0;color:#999;cursor:pointer}
.wb.on{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.pg{padding:12px 12px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:8px;letter-spacing:.02em}
.wktit{font-size:19px;font-weight:800;margin-bottom:2px}
.wksub{font-size:13px;color:#999;margin-bottom:12px;line-height:1.5}
.dc{background:#1c1c1a;border:1px solid #2a2a28;border-radius:13px;padding:13px;margin-bottom:9px}
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.dn{font-size:11px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.06em}
.dt{font-size:11px;color:#888;text-align:right;line-height:1.5}
.tgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tg{font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;letter-spacing:.02em}
.bb{background:#0c447c;color:#cfe6ff}
.lf{background:#1e4a07;color:#d7eebd}
.gr{background:#5a3200;color:#ffdca0}
.sp{background:#6b1035;color:#ffc2dc}
.ar{background:#6b2010;color:#ffc7b0}
.rs{background:#3a3a36;color:#ccc}
.sh{font-size:11px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:9px 0 5px;padding-top:9px;border-top:1px solid #2a2a28}
.sh:first-of-type{border-top:none;padding-top:0;margin-top:0}
.er{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #262624}
.er:last-child{border-bottom:none}
.en{font-size:14px;font-weight:500;line-height:1.4;color:#f0f0ec}
.enote{font-size:11px;color:#888;margin-top:2px;line-height:1.4}
.es{font-size:12px;color:#bbb;white-space:nowrap;font-weight:600;padding-top:2px}
.rm{font-size:13px;color:#888;font-style:italic}
.wtog{display:flex;gap:7px;margin-bottom:9px}
.wt2{flex:1;font-size:13px;font-weight:700;padding:9px;border-radius:8px;border:1px solid #3a3a38;background:0;color:#bbb;cursor:pointer}
.wt2.on{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.rdcard{background:#1a1a18;border:1px solid #2a2a28;border-radius:13px;padding:12px;margin-bottom:9px;font-size:13px;color:#888;font-style:italic}
.tip{background:#1a2535;border-left:3px solid #5fa0e8;padding:11px 13px;border-radius:0 10px 10px 0;margin-top:10px}
.tipl{font-size:10px;font-weight:800;color:#5fa0e8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.tipt{font-size:12px;color:#bbb;line-height:1.6}
.mcat{font-size:12px;font-weight:800;padding:4px 10px;border-radius:99px;display:inline-block;margin-bottom:9px}
.mob-picker{display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;padding-bottom:2px}
.mob-picker::-webkit-scrollbar{display:none}
.mob-pick-btn{flex-shrink:0;font-size:12px;font-weight:700;padding:8px 14px;border-radius:99px;border:1px solid #3a3a38;background:#1c1c1a;color:#999;cursor:pointer;white-space:nowrap;transition:all .15s}
.mob-pick-btn.sel{border-width:1.5px}
.wlcard{background:#1c1c1a;border:1px solid #2a2a28;border-radius:13px;padding:13px;margin-bottom:9px}
.wlcard h3{font-size:15px;font-weight:700;margin-bottom:3px;color:#f0f0ec}
.wlcard p{font-size:12px;color:#888;margin-bottom:11px}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.we label{font-size:11px;color:#999;font-weight:600;display:block;margin-bottom:3px}
.we input{width:100%;font-size:14px;font-weight:700;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec}
.we input:focus{border-color:#5fa0e8;outline:none}
.uwrap{display:flex;align-items:center;gap:3px}
.uu{font-size:11px;color:#888}
.cbars{display:flex;align-items:flex-end;gap:4px;height:64px;margin:10px 0 3px}
.cb{flex:1;border-radius:4px 4px 0 0;background:#333;min-height:3px}
.cb.hd2{background:#1a5fa8}
.cxl-row{display:flex;gap:4px}
.cxl{flex:1;font-size:10px;color:#888;text-align:center}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ev-bat{background:#1c1c1a;border:1px solid #2a2a28;border-radius:13px;padding:13px;margin-bottom:9px}
.ev-bat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ev-bat-name{font-size:15px;font-weight:800;color:#f0f0ec}
.ev-top{font-size:22px;font-weight:800;color:#5fa0e8;line-height:1}
.ev-top-lbl{font-size:10px;color:#888;font-weight:600;margin-top:2px;text-align:right}
.ev-sessions{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.ev-session-row{display:flex;align-items:center;gap:7px}
.ev-session-date{font-size:11px;color:#888;width:68px;flex-shrink:0;background:#222;border:1px solid #3a3a38;border-radius:6px;padding:5px 6px}
.ev-session-input{flex:1;font-size:14px;font-weight:700;padding:6px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec;width:100%}
.ev-session-input:focus{border-color:#5fa0e8;outline:none}
.ev-mph{font-size:11px;color:#888;flex-shrink:0}
.ev-bars{display:flex;align-items:flex-end;gap:3px;height:44px;margin-top:8px}
.ev-bar{flex:1;border-radius:3px 3px 0 0;background:#1a3050;min-height:3px;transition:height .2s}
.ev-bar.peak{background:#1a5fa8}
.ev-add-btn{width:100%;font-size:12px;font-weight:700;padding:7px;border-radius:7px;border:1px solid #1a5fa8;color:#5fa0e8;background:0;cursor:pointer;margin-top:6px}
.ev-add-btn:active{background:#13243a}
.ev-summary{background:#0e1a2a;border:1px solid #1a3050;border-radius:13px;padding:13px;margin-bottom:9px}
.ev-summary h3{font-size:14px;font-weight:800;margin-bottom:10px;color:#f0f0ec}
.ev-sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.ev-sum-item{background:#1c2535;border-radius:9px;padding:9px 10px;border:1px solid #1a3050}
.ev-sum-bat{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.ev-sum-val{font-size:18px;font-weight:800;color:#5fa0e8}
.ev-sum-mph{font-size:10px;color:#888}
/* ── LIFTS ── */
.lift-intro{font-size:13px;color:#999;margin-bottom:14px;line-height:1.6}
.lift-add-card{background:#1c1c1a;border:1px solid #2a2a28;border-radius:14px;padding:15px;margin-bottom:14px}
.lift-add-hdr{font-size:14px;font-weight:800;color:#f0f0ec;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.lift-add-hdr svg{flex-shrink:0}
.lift-form-row{display:flex;gap:8px;margin-bottom:8px}
.lift-form-field{flex:1;display:flex;flex-direction:column;gap:3px}
.lift-form-field label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.04em}
.lift-form-field input,.lift-form-field select{font-size:14px;font-weight:600;padding:8px 9px;border:1px solid #3a3a38;border-radius:8px;background:#222;color:#f0f0ec;width:100%;-webkit-appearance:none;appearance:none}
.lift-form-field input:focus,.lift-form-field select:focus{border-color:#5fa0e8;outline:none;background:#262624}
.lift-form-field.wide{flex:2.2}
.lift-save-btn{width:100%;font-size:13px;font-weight:800;color:#fff;background:#1a5fa8;border:none;border-radius:9px;padding:11px;cursor:pointer;margin-top:4px;letter-spacing:.02em}
.lift-save-btn:active{opacity:.85}
.lift-section-lbl{font-size:11px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.07em;margin:18px 0 9px;display:flex;justify-content:space-between;align-items:center}
.lift-sort-select{font-size:11px;font-weight:600;color:#999;border:1px solid #3a3a38;border-radius:7px;padding:3px 8px;background:#1c1c1a;text-transform:none;letter-spacing:0}
.lift-card{background:#1c1c1a;border:1px solid #2a2a28;border-radius:14px;margin-bottom:10px;overflow:hidden}
.lift-card-hdr{padding:14px 15px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.lift-card-name{font-size:16px;font-weight:800;color:#f0f0ec;letter-spacing:-.01em}
.lift-card-cat{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:5px;letter-spacing:.02em}
.lift-card-pr{text-align:right}
.lift-pr-val{font-size:20px;font-weight:800;color:#5fa0e8;line-height:1}
.lift-pr-lbl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.lift-card-chevron{transition:transform .2s;color:#777;margin-left:4px;flex-shrink:0}
.lift-card-chevron.open{transform:rotate(180deg)}
.lift-card-body{display:none;padding:0 15px 15px;border-top:1px solid #2a2a28}
.lift-card-body.open{display:block}
.lift-mini-stats{display:flex;gap:18px;padding:12px 0 4px}
.lift-mini-stat{flex:1}
.lift-mini-stat-val{font-size:15px;font-weight:800;color:#f0f0ec}
.lift-mini-stat-lbl{font-size:10px;color:#888;font-weight:600;margin-top:1px}
.lift-history-hdr{font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px}
.lift-hist-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #262624}
.lift-hist-row:last-child{border-bottom:none}
.lift-hist-date{font-size:11px;color:#888;width:62px;flex-shrink:0;font-weight:600}
.lift-hist-detail{flex:1;font-size:13px;color:#ddd;font-weight:600}
.lift-hist-est{font-size:11px;color:#777;margin-left:8px}
.lift-hist-del{font-size:11px;color:#e08080;background:none;border:none;cursor:pointer;padding:4px 6px;flex-shrink:0}
.lift-card-actions{display:flex;gap:8px;margin-top:12px}
.lift-action-btn{flex:1;font-size:12px;font-weight:700;padding:8px;border-radius:8px;border:1px solid #3a3a38;background:#222;color:#ccc;cursor:pointer;text-align:center}
.lift-action-btn.danger{color:#e08080;border-color:#4a2a2a}
.lift-empty-state{text-align:center;padding:30px 10px;color:#777}
.lift-empty-state svg{margin-bottom:10px;opacity:.4}
.lift-empty-state-text{font-size:13px;font-weight:600;color:#999}
.lift-empty-state-sub{font-size:12px;color:#666}
.lift-pr-banner{background:linear-gradient(135deg,#2a2208,#1c1c1a);border:1px solid #4a3c10;border-radius:10px;padding:9px 12px;margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:#f5cc60;font-weight:700}
.lift-quick-add-form{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed #3a3a38}
.lift-quick-add-form.open{display:block}
/* ── TEMPLATES ── */
.tpl-bar{display:flex;gap:7px;align-items:center;margin-bottom:12px}
.tpl-select{flex:1;font-size:13px;font-weight:600;padding:9px 10px;border:1px solid #3a3a38;border-radius:9px;background:#1c1c1a;color:#f0f0ec;-webkit-appearance:none;appearance:none}
.tpl-btn{flex-shrink:0;font-size:12px;font-weight:700;padding:9px 13px;border-radius:9px;border:1px solid #3a3a38;background:#1c1c1a;color:#bbb;cursor:pointer;white-space:nowrap}
.tpl-btn.primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.tpl-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;align-items:flex-end;justify-content:center}
.tpl-modal-bg.show{display:flex}
.tpl-modal{background:#1c1c1a;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:460px;max-height:80vh;overflow-y:auto}
.tpl-modal-hdr{font-size:16px;font-weight:800;color:#f0f0ec;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.tpl-modal-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.tpl-modal-field{margin-bottom:12px}
.tpl-modal-field label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.tpl-modal-field input{width:100%;font-size:15px;font-weight:600;padding:10px 11px;border:1px solid #3a3a38;border-radius:9px;background:#222;color:#f0f0ec}
.tpl-modal-field input:focus{border-color:#5fa0e8;outline:none}
.tpl-modal-save{width:100%;font-size:14px;font-weight:800;color:#fff;background:#1a5fa8;border:none;border-radius:10px;padding:13px;cursor:pointer;margin-top:6px}
.tpl-list-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #2a2a28}
.tpl-list-row:last-child{border-bottom:none}
.tpl-list-name{font-size:14px;font-weight:600;color:#f0f0ec}
.tpl-list-sub{font-size:11px;color:#777;margin-top:1px}
.tpl-list-del{font-size:12px;color:#e08080;background:none;border:none;cursor:pointer;padding:5px 8px}
.tpl-empty{font-size:13px;color:#777;font-style:italic;text-align:center;padding:20px 0}
/* ── MEALS ── */
.meal-summary{background:#1c1c1a;border:1px solid #2a2a28;border-radius:16px;padding:16px;margin-bottom:14px}
.meal-summary-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.meal-summary-date{font-size:13px;font-weight:700;color:#f0f0ec}
.meal-date-nav{display:flex;gap:6px;align-items:center}
.meal-date-btn{width:26px;height:26px;border-radius:50%;border:1px solid #3a3a38;background:none;color:#999;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.meal-cal-ring-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}
.meal-ring-box{position:relative;width:128px;height:128px;flex-shrink:0}
.meal-ring-svg{width:128px;height:128px;transform:rotate(-90deg)}
.meal-ring-track{fill:none;stroke:#2a2a28;stroke-width:10}
.meal-ring-prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .4s ease}
.meal-ring-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.meal-ring-val{font-size:24px;font-weight:800;color:#f0f0ec;line-height:1}
.meal-ring-lbl{font-size:10px;color:#888;font-weight:600;margin-top:2px}
.meal-ring-goal{font-size:9px;color:#666;margin-top:1px}
.meal-macro-bars{flex:1;display:flex;flex-direction:column;gap:9px}
.meal-macro-row{display:flex;flex-direction:column;gap:3px}
.meal-macro-hdr{display:flex;justify-content:space-between;font-size:11px;font-weight:700}
.meal-macro-name{color:#ccc}
.meal-macro-nums{color:#888;font-weight:600}
.meal-macro-track{width:100%;height:6px;background:#2a2a28;border-radius:99px;overflow:hidden}
.meal-macro-fill{height:100%;border-radius:99px;transition:width .3s}
.meal-section-lbl{font-size:11px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.meal-block{background:#1c1c1a;border:1px solid #2a2a28;border-radius:13px;margin-bottom:9px;overflow:hidden}
.meal-block-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.meal-block-name{font-size:14px;font-weight:700;color:#f0f0ec}
.meal-block-cal{font-size:13px;font-weight:700;color:#888}
.meal-block-body{padding:0 14px 12px}
.meal-food-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #262624;gap:8px}
.meal-food-row:last-child{border-bottom:none}
.meal-food-name{font-size:13px;font-weight:600;color:#e8e8e4}
.meal-food-macros{font-size:10px;color:#777;margin-top:1px}
.meal-food-cal{font-size:13px;font-weight:700;color:#bbb;white-space:nowrap}
.meal-food-del{font-size:11px;color:#e08080;background:none;border:none;cursor:pointer;padding:4px 6px;flex-shrink:0}
.meal-add-btn{width:100%;font-size:12px;font-weight:700;color:#5fa0e8;background:none;border:1px dashed #1a5fa8;border-radius:9px;padding:9px;cursor:pointer;margin-top:8px}
.meal-form{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #3a3a38}
.meal-form.open{display:block}
.meal-form-row{display:flex;gap:7px;margin-bottom:7px}
.meal-form-field{flex:1;display:flex;flex-direction:column;gap:3px}
.meal-form-field.wide{flex:2}
.meal-form-field label{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.03em}
.meal-form-field input{font-size:13px;font-weight:600;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec;width:100%}
.meal-form-field input:focus{border-color:#5fa0e8;outline:none}
.meal-form-save{width:100%;font-size:12px;font-weight:800;color:#fff;background:#1a5fa8;border:none;border-radius:8px;padding:9px;cursor:pointer;margin-top:2px}
.meal-goals-card{background:#1c1c1a;border:1px solid #2a2a28;border-radius:13px;padding:13px;margin-top:14px}
.meal-goals-hdr{font-size:13px;font-weight:800;color:#f0f0ec;margin-bottom:10px}
.meal-goals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.meal-goal-field{display:flex;flex-direction:column;gap:3px}
.meal-goal-field label{font-size:10px;font-weight:700;color:#999}
.meal-goal-field input{font-size:13px;font-weight:700;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec}
.meal-recent-chip-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;scrollbar-width:none;padding-bottom:2px}
.meal-recent-chip-row::-webkit-scrollbar{display:none}
.meal-recent-chip{flex-shrink:0;font-size:11px;font-weight:600;padding:6px 11px;border-radius:99px;border:1px solid #3a3a38;background:#1c1c1a;color:#bbb;cursor:pointer;white-space:nowrap}
/* ── LOCK IN ── */
#li-screen{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:200;flex-direction:column;align-items:center;overflow-y:auto}
#li-screen.show{display:flex}
.li-wrap{width:100%;max-width:420px;padding:0 20px 60px;display:flex;flex-direction:column;align-items:center}
.li-top{width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 0 10px}
.li-close{background:none;border:none;color:#555;font-size:22px;cursor:pointer;line-height:1;padding:4px}
.li-heading{font-size:13px;font-weight:700;color:#555;letter-spacing:.1em;text-transform:uppercase}
.li-streak{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:#f5a623}
.li-streak-fire{font-size:16px}
.li-empty{font-size:13px;color:#333;text-align:center;padding:24px 0;font-style:italic}
/* Habits */
.li-habits-date{width:100%;font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;text-align:center}
.li-hab-progress{width:100%;background:#161616;border-radius:99px;height:6px;margin-bottom:18px;overflow:hidden}
.li-hab-progress-fill{height:100%;background:linear-gradient(90deg,#f5a623,#34d399);border-radius:99px;transition:width .3s}

.bw-pattern-btn{font-size:11px;font-weight:700;padding:7px 14px;border-radius:99px;border:1px solid #1a2230;color:#445;background:none;cursor:pointer}

#lock-screen{position:fixed;inset:0;background:#0a0a0a;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.lock-sub{font-size:12px;color:#777;margin-bottom:30px}

.lock-dot.filled{background:#5fa0e8;border-color:#5fa0e8}
.lock-dot.err{background:#e05050;border-color:#e05050}

.lock-key{width:64px;height:64px;border-radius:50%;border:1px solid #2a2a28;background:#1c1c1a;color:#f0f0ec;font-size:22px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lock-key:active{background:#2a2a28}
.lock-key.ghost{background:none;border:none;cursor:default}
.lock-key.del{font-size:16px;color:#999}
.lock-shake{animation:lockshake .35s}

/* ── LOCK SCREEN ── */
var LOCK_CODE='1739';
var lockEntered='';
function lockBuildKeypad(){
  var keys=['1','2','3','4','5','6','7','8','9','','0','del'];
  var h='';
  keys.forEach(function(k){
    if(k===''){h+='<div class="lock-key ghost"></div>';}
    else if(k==='del'){h+='<button class="lock-key del" onclick="lockDelete()">⌫</button>';}
    else{h+='<button class="lock-key" onclick="lockPress(\''+k+'\')">'+k+'</button>';}
  });
  document.getElementById('lock-keypad').innerHTML=h;
}
function lockRenderDots(){
  var dots=document.querySelectorAll('#lock-dots .lock-dot');
  dots.forEach(function(d,i){
    d.className='lock-dot'+(i<lockEntered.length?' filled':'');
  });
}
function lockPress(digit){
  if(lockEntered.length>=4)return;
  lockEntered+=digit;
  lockRenderDots();
  if(lockEntered.length===4){
    setTimeout(lockCheck,120);
  }
}
function lockDelete(){
  lockEntered=lockEntered.slice(0,-1);
  lockRenderDots();
}
function lockCheck(){
  if(lockEntered===LOCK_CODE){
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app-root').classList.remove('locked');
  } else {
    var dotsWrap=document.getElementById('lock-dots');
    dotsWrap.classList.add('lock-shake');
    document.querySelectorAll('#lock-dots .lock-dot').forEach(function(d){d.className='lock-dot err';});
    setTimeout(function(){
      dotsWrap.classList.remove('lock-shake');
      lockEntered='';
      lockRenderDots();
    },380);
  }
}

      if(filled.length){
        h+='<div class="ev-bars">';
        filled.forEach(function(sess){
          var bh=minVal!==null?Math.max(4,Math.round(((sess.v-minVal)/rng)*36)+8):8;
          var isPeak=sess.v===topVal;

        });
        h+='</div>';
      }

    h+='<button class="ev-add-btn" style="border-color:'+bat.color+';color:'+bat.color+'" onclick="addSession(\''+bat.id+'\')">+ Add session</button>';
    h+='</div>';
  });
  if(allTops.length>1){
    h+='<div class="ev-summary"><h3>Top exit velo by bat</h3><div class="ev-sum-grid">';

    });
    h+='</div></div>';
  }
  document.getElementById('pg').innerHTML=h;
}

    h+='<div style="display:flex;align-items:center">';
    if(stats.topWeight>0){
      h+='<div class="lift-card-pr"><div class="lift-pr-val">'+stats.topWeight+'</div><div class="lift-pr-lbl">top lb</div></div>';
    } else {
      h+='<div style="font-size:11px;color:#bbb;font-style:italic;padding-top:4px">No data</div>';
    }
    h+='<svg class="lift-card-chevron'+(isOpen?' open':'')+'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
    h+='</div></div>';

    h+='<div class="lift-card-body'+(isOpen?' open':'')+'">';
    if(stats.totalSessions>0){
      h+='<div class="lift-mini-stats">';
      h+='<div class="lift-mini-stat"><div class="lift-mini-stat-val">'+stats.topWeight+' lb</div><div class="lift-mini-stat-lbl">Top weight</div></div>';
      h+='<div class="lift-mini-stat"><div class="lift-mini-stat-val">'+stats.topEst+' lb</div><div class="lift-mini-stat-lbl">Est. 1RM</div></div>';
      h+='<div class="lift-mini-stat"><div class="lift-mini-stat-val">'+stats.totalSessions+'</div><div class="lift-mini-stat-lbl">Logged sets</div></div>';
      h+='</div>';
    }

    h+='<div class="lift-quick-add-form open">';
    h+='<div class="lift-form-row">';
    h+='<div class="lift-form-field"><label>Weight (lb)</label><input type="number" inputmode="decimal" id="qa_weight_'+lift.id+'" placeholder="0"></div>';
    h+='<div class="lift-form-field"><label>Reps</label><input type="number" inputmode="numeric" id="qa_reps_'+lift.id+'" placeholder="0"></div>';
    h+='<div class="lift-form-field"><label>Sets</label><input type="number" inputmode="numeric" id="qa_sets_'+lift.id+'" placeholder="1"></div>';
    h+='</div>';
    h+='<button class="lift-save-btn" onclick="liftSaveEntry(\''+lift.id+'\')">Log entry</button>';
    h+='</div>';

    if(entries.length){
      h+='<div class="lift-history-hdr">History</div>';
      entries.slice(0,10).forEach(function(e){
        var est=estOneRM(e.w,e.r);
        h+='<div class="lift-hist-row">';
        h+='<div class="lift-hist-date">'+e.d+'</div>';
        h+='<div class="lift-hist-detail">'+e.w+' lb × '+e.r+(e.sets>1?' × '+e.sets+' sets':'')+'<span class="lift-hist-est">est. 1RM '+est+' lb</span></div>';
        h+='<button class="lift-hist-del" onclick="liftDeleteEntry(\''+lift.id+'\','+e.ts+')">✕</button>';
        h+='</div>';
      });
      if(stats.topWeight>0 && entries[0].w===stats.topWeight){
        h+='<div class="lift-pr-banner">🏆 Most recent entry matches your top weight</div>';
      }
    } else {
      h+='<div style="font-size:12px;color:#aaa;font-style:italic;padding:8px 0 2px">No sessions logged yet — add your first above.</div>';
    }

    h+='<div class="lift-card-actions">';
    h+='<button class="lift-action-btn danger" onclick="if(confirm(\'Delete '+lift.name.replace(/'/g,"\\'")+' and all its history?\'))liftDelete(\''+lift.id+'\')">Delete lift</button>';
    h+='</div>';

    h+='</div></div>';
  });

  return h;
}

/* ── TEMPLATES ── */
var TPL_EDITING=null;
var TPL_DRAFT=[];

function getTemplates(){
  try{return JSON.parse(g('tpl_list')||'[]');}catch(e){return [];}
}
function saveTemplates(arr){s('tpl_list',JSON.stringify(arr));}

function tplOpenNew(){
  TPL_EDITING=null;
  TPL_DRAFT=[{name:'',cat:'push',weight:'',reps:'',sets:''}];
  document.getElementById('tpl-modal-title').textContent='New template';
  document.getElementById('tpl-name-input').value='';
  tplRenderDraft();
  document.getElementById('tpl-modal-bg').classList.add('show');
}

function tplOpenEdit(tplId){
  var tpls=getTemplates();
  var tpl=tpls.find(function(t){return t.id===tplId;});
  if(!tpl)return;
  TPL_EDITING=tplId;
  TPL_DRAFT=tpl.items.map(function(it){return Object.assign({},it);});
  document.getElementById('tpl-modal-title').textContent='Edit template';
  document.getElementById('tpl-name-input').value=tpl.name;
  tplRenderDraft();
  document.getElementById('tpl-modal-bg').classList.add('show');
}

function tplClose(){
  document.getElementById('tpl-modal-bg').classList.remove('show');
}

function tplAddDraftRow(){
  TPL_DRAFT.push({name:'',cat:'push',weight:'',reps:'',sets:''});
  tplRenderDraft();
}

function tplUpdateDraftField(idx,field,val){
  TPL_DRAFT[idx][field]=val;
}

function tplRemoveDraftRow(idx){
  TPL_DRAFT.splice(idx,1);
  if(!TPL_DRAFT.length)TPL_DRAFT.push({name:'',cat:'push',weight:'',reps:'',sets:''});
  tplRenderDraft();
}

function tplRenderDraft(){
  var h='';
  TPL_DRAFT.forEach(function(item,idx){
    h+='<div style="background:#161614;border:1px solid #2a2a28;border-radius:10px;padding:10px;margin-bottom:8px">';
    h+='<div style="display:flex;gap:7px;margin-bottom:7px">';
    h+='<input type="text" placeholder="Exercise name" value="'+(item.name||'').replace(/"/g,'&quot;')+'" oninput="tplUpdateDraftField('+idx+',\'name\',this.value)" style="flex:2;font-size:13px;font-weight:600;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec">';
    h+='<select onchange="tplUpdateDraftField('+idx+',\'cat\',this.value)" style="flex:1;font-size:12px;font-weight:600;padding:7px 6px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec">';
    LIFT_CATS.forEach(function(c){h+='<option value="'+c.id+'"'+(item.cat===c.id?' selected':'')+'>'+c.l+'</option>';});
    h+='</select>';
    h+='</div>';
    h+='<div style="display:flex;gap:7px">';
    h+='<input type="number" inputmode="decimal" placeholder="Weight" value="'+(item.weight||'')+'" oninput="tplUpdateDraftField('+idx+',\'weight\',this.value)" style="flex:1;font-size:13px;font-weight:600;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec">';
    h+='<input type="number" inputmode="numeric" placeholder="Reps" value="'+(item.reps||'')+'" oninput="tplUpdateDraftField('+idx+',\'reps\',this.value)" style="flex:1;font-size:13px;font-weight:600;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec">';
    h+='<input type="number" inputmode="numeric" placeholder="Sets" value="'+(item.sets||'')+'" oninput="tplUpdateDraftField('+idx+',\'sets\',this.value)" style="flex:1;font-size:13px;font-weight:600;padding:7px 8px;border:1px solid #3a3a38;border-radius:7px;background:#222;color:#f0f0ec">';
    h+='<button onclick="tplRemoveDraftRow('+idx+')" style="flex-shrink:0;width:34px;font-size:14px;color:#e08080;background:none;border:1px solid #3a2a2a;border-radius:7px;cursor:pointer">✕</button>';
    h+='</div></div>';
  });
  h+='<button onclick="tplAddDraftRow()" style="width:100%;font-size:12px;font-weight:700;color:#5fa0e8;background:none;border:1px dashed #1a5fa8;border-radius:9px;padding:9px;cursor:pointer;margin-bottom:4px">+ Add exercise</button>';
  document.getElementById('tpl-draft-list').innerHTML=h;
}

function tplSave(){
  var name=document.getElementById('tpl-name-input').value.trim();
  if(!name)return;
  var items=TPL_DRAFT.filter(function(it){return it.name&&it.name.trim();});
  if(!items.length)return;
  var tpls=getTemplates();
  if(TPL_EDITING){
    var tpl=tpls.find(function(t){return t.id===TPL_EDITING;});
    if(tpl){tpl.name=name;tpl.items=items;}
  } else {
    tpls.push({id:'tpl_'+Date.now(),name:name,items:items,created:Date.now()});
  }
  saveTemplates(tpls);
  tplClose();
  rtpl();
}

function tplDelete(tplId){
  var tpls=getTemplates().filter(function(t){return t.id!==tplId;});
  saveTemplates(tpls);
  rtpl();
}

function tplApply(tplId){
  var tpls=getTemplates();
  var tpl=tpls.find(function(t){return t.id===tplId;});
  if(!tpl)return;
  var lifts=getLifts();
  var today=new Date();
  var dateStr=(today.getMonth()+1)+'/'+today.getDate();
  var appliedCount=0;

  tpl.items.forEach(function(item){
    var existing=lifts.find(function(l){return l.name.toLowerCase()===item.name.toLowerCase();});
    var liftId;
    if(existing){
      liftId=existing.id;
    } else {
      liftId='lift_'+Date.now()+'_'+Math.floor(Math.random()*10000);
      lifts.push({id:liftId,name:item.name,cat:item.cat||'other',created:Date.now()});
    }
    if(item.weight&&item.reps){
      var entries=getLiftEntries(liftId);
      entries.unshift({w:parseFloat(item.weight),r:parseFloat(item.reps),sets:parseFloat(item.sets)||1,d:dateStr,ts:Date.now()+appliedCount});
      saveLiftEntries(liftId,entries);
      appliedCount++;
    }
  });
  saveLifts(lifts);
  s('tpl_last_applied',tpl.name+' · '+dateStr);
  rtpl();
}

function rtpl(){
  var tpls=getTemplates();
  var h='<div class="lift-intro">Save a workout once as a template, then apply it with one tap to log every exercise straight into your ongoing lift log below. Great for recurring days like arm day or your standard lower-body lift.</div>';

  h+='<button class="lift-save-btn" onclick="tplOpenNew()" style="margin-bottom:16px">+ New template</button>';

  var lastApplied=g('tpl_last_applied');
  if(lastApplied){
    h+='<div class="lift-pr-banner">✅ Applied "'+lastApplied+'" — scroll down to see logged entries</div>';
  }

  if(!tpls.length){
    h+='<div class="lift-empty-state">';
    h+='<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>';
    h+='<div class="lift-empty-state-text">No templates yet</div>';
    h+='<div class="lift-empty-state-sub">Build your first one above — name it, add exercises, save</div>';
    h+='</div>';
  } else {
    h+='<div class="lift-section-lbl">Your templates ('+tpls.length+')</div>';

    tpls.slice().sort(function(a,b){return b.created-a.created;}).forEach(function(tpl){
      h+='<div class="lift-card">';
      h+='<div class="lift-card-hdr" style="cursor:default">';
      h+='<div><div class="lift-card-name">'+tpl.name+'</div>';
      h+='<div style="font-size:11px;color:#888;margin-top:4px">'+tpl.items.length+' exercise'+(tpl.items.length===1?'':'s')+'</div></div>';
      h+='</div>';
      h+='<div class="lift-card-body open">';
      tpl.items.forEach(function(item,i){
        if(i)h+='<div style="border-top:1px solid #262624;margin:2px 0"></div>';
        var cat=liftGetCat(item.cat);
        h+='<div class="er"><div><div class="en">'+item.name+'</div>';
        h+='<div class="enote"><span class="lift-card-cat" style="background:'+cat.bg+';color:'+cat.tc+';margin-top:3px">'+cat.l+'</span></div></div>';
        var detail=(item.weight?item.weight+' lb':'')+(item.reps?' × '+item.reps:'')+(item.sets&&item.sets>1?' × '+item.sets+' sets':'');
        h+='<div class="es">'+(detail||'—')+'</div></div>';
      });
      h+='<div class="lift-card-actions">';
      h+='<button class="lift-action-btn" style="background:#1a5fa8;color:#fff;border-color:#1a5fa8" onclick="tplApply(\''+tpl.id+'\')">Apply today</button>';
      h+='<button class="lift-action-btn" onclick="tplOpenEdit(\''+tpl.id+'\')">Edit</button>';
      h+='<button class="lift-action-btn danger" onclick="if(confirm(\'Delete template '+tpl.name.replace(/'/g,"\\'")+'?\'))tplDelete(\''+tpl.id+'\')">Delete</button>';
      h+='</div>';
      h+='</div></div>';
    });
  }

  h+=liftLogHtml();

  document.getElementById('pg').innerHTML=h;
}

/* ── MEALS ── */
var MEAL_DATE_OFFSET=0;
var MEAL_OPEN={breakfast:true,lunch:true,dinner:false,snacks:false};
var MEAL_FORM_OPEN={};
var MEAL_SECTIONS=[
  {id:'breakfast',label:'Breakfast'},
  {id:'lunch',label:'Lunch'},
  {id:'dinner',label:'Dinner'},
  {id:'snacks',label:'Snacks'}
];
var MEAL_DEFAULT_GOALS={cal:3200,protein:180,carbs:380,fat:100};

function mealDateKeyForOffset(offset){
  var d=new Date();
  d.setDate(d.getDate()+offset);
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function mealDateLabel(offset){
  var d=new Date();
  d.setDate(d.getDate()+offset);
  if(offset===0)return 'Today, '+d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  if(offset===-1)return 'Yesterday, '+d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
}
function mealNavDate(dir){
  MEAL_DATE_OFFSET+=dir;
  if(MEAL_DATE_OFFSET>0)MEAL_DATE_OFFSET=0;
  rmeal();
}

function getMealGoals(){
  try{
    var saved=JSON.parse(g('meal_goals')||'null');
    if(saved)return saved;
  }catch(e){}
  return Object.assign({},MEAL_DEFAULT_GOALS);
}
function saveMealGoals(goals){s('meal_goals',JSON.stringify(goals));}

function getMealLog(dateKey){
  try{return JSON.parse(g('meal_log_'+dateKey)||'{}');}catch(e){return {};}
}
function saveMealLog(dateKey,log){s('meal_log_'+dateKey,JSON.stringify(log));}

function getRecentFoods(){
  try{return JSON.parse(g('meal_recent')||'[]');}catch(e){return [];}
}
function addRecentFood(food){
  var recent=getRecentFoods();
  recent=recent.filter(function(f){return f.name.toLowerCase()!==food.name.toLowerCase();});
  recent.unshift(food);
  saveLocalRecent(recent.slice(0,12));
}
function saveLocalRecent(arr){s('meal_recent',JSON.stringify(arr));}

function mealToggleSection(secId){
  MEAL_OPEN[secId]=!MEAL_OPEN[secId];
  rmeal();
}
function mealToggleForm(secId){
  MEAL_FORM_OPEN[secId]=!MEAL_FORM_OPEN[secId];
  rmeal();
  if(MEAL_FORM_OPEN[secId]){
    setTimeout(function(){
      var el=document.getElementById('mf_name_'+secId);
      if(el)el.focus();
    },50);
  }
}

function mealSaveFood(secId){
  var name=document.getElementById('mf_name_'+secId).value.trim();
  var cal=parseFloat(document.getElementById('mf_cal_'+secId).value)||0;
  var protein=parseFloat(document.getElementById('mf_protein_'+secId).value)||0;
  var carbs=parseFloat(document.getElementById('mf_carbs_'+secId).value)||0;
  var fat=parseFloat(document.getElementById('mf_fat_'+secId).value)||0;
  if(!name||!cal)return;

  var dateKey=mealDateKeyForOffset(MEAL_DATE_OFFSET);
  var log=getMealLog(dateKey);
  if(!log[secId])log[secId]=[];
  var entry={name:name,cal:cal,protein:protein,carbs:carbs,fat:fat,ts:Date.now()};
  log[secId].push(entry);
  saveMealLog(dateKey,log);
  addRecentFood({name:name,cal:cal,protein:protein,carbs:carbs,fat:fat});

  MEAL_FORM_OPEN[secId]=false;
  rmeal();
}

function mealDeleteFood(secId,ts){
  var dateKey=mealDateKeyForOffset(MEAL_DATE_OFFSET);
  var log=getMealLog(dateKey);
  if(log[secId]){
    log[secId]=log[secId].filter(function(f){return f.ts!==ts;});
    saveMealLog(dateKey,log);
  }
  rmeal();
}

function mealSaveGoals(){
  var goals={
    cal:parseFloat(document.getElementById('mg_cal').value)||MEAL_DEFAULT_GOALS.cal,
    protein:parseFloat(document.getElementById('mg_protein').value)||MEAL_DEFAULT_GOALS.protein,
    carbs:parseFloat(document.getElementById('mg_carbs').value)||MEAL_DEFAULT_GOALS.carbs,
    fat:parseFloat(document.getElementById('mg_fat').value)||MEAL_DEFAULT_GOALS.fat
  };
  saveMealGoals(goals);
  rmeal();
}

function mealDayTotals(dateKey){
  var log=getMealLog(dateKey);
  var t={cal:0,protein:0,carbs:0,fat:0};
  MEAL_SECTIONS.forEach(function(sec){
    (log[sec.id]||[]).forEach(function(f){
      t.cal+=f.cal||0;t.protein+=f.protein||0;t.carbs+=f.carbs||0;t.fat+=f.fat||0;
    });
  });
  return t;
}

function rmeal(){
  var dateKey=mealDateKeyForOffset(MEAL_DATE_OFFSET);
  var log=getMealLog(dateKey);
  var goals=getMealGoals();
  var totals=mealDayTotals(dateKey);
  var recent=getRecentFoods();

  var h='';

  h+='<div class="meal-summary">';
  h+='<div class="meal-summary-top">';
  h+='<div class="meal-summary-date">'+mealDateLabel(MEAL_DATE_OFFSET)+'</div>';
  h+='<div class="meal-date-nav">';
  h+='<button class="meal-date-btn" onclick="mealNavDate(-1)">‹</button>';
  h+='<button class="meal-date-btn" onclick="mealNavDate(1)" style="opacity:'+(MEAL_DATE_OFFSET>=0?'.3':'1')+'">›</button>';
  h+='</div></div>';

  var calPct=Math.min(1,totals.cal/(goals.cal||1));
  var circ=2*Math.PI*54;
  var offset=circ*(1-calPct);
  var calColor=totals.cal>goals.cal?'#e08080':'#5fa0e8';
  var calRemaining=Math.max(0,goals.cal-totals.cal);

  h+='<div class="meal-cal-ring-wrap">';
  h+='<div class="meal-ring-box"><svg class="meal-ring-svg" viewBox="0 0 128 128">';
  h+='<circle class="meal-ring-track" cx="64" cy="64" r="54"/>';
  h+='<circle class="meal-ring-prog" cx="64" cy="64" r="54" stroke="'+calColor+'" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"/>';
  h+='</svg><div class="meal-ring-overlay">';
  h+='<div class="meal-ring-val">'+Math.round(totals.cal)+'</div>';
  h+='<div class="meal-ring-lbl">calories</div>';
  h+='<div class="meal-ring-goal">of '+goals.cal+'</div>';
  h+='</div></div>';

  h+='<div class="meal-macro-bars">';
  var macros=[
    {key:'protein',label:'Protein',color:'#5fa0e8',unit:'g'},
    {key:'carbs',label:'Carbs',color:'#34d399',unit:'g'},
    {key:'fat',label:'Fat',color:'#f5a623',unit:'g'}
  ];
  macros.forEach(function(m){
    var val=totals[m.key]||0;
    var goal=goals[m.key]||1;
    var pct=Math.min(100,Math.round((val/goal)*100));
    h+='<div class="meal-macro-row">';
    h+='<div class="meal-macro-hdr"><span class="meal-macro-name">'+m.label+'</span><span class="meal-macro-nums">'+Math.round(val)+' / '+goal+m.unit+'</span></div>';
    h+='<div class="meal-macro-track"><div class="meal-macro-fill" style="width:'+pct+'%;background:'+m.color+'"></div></div>';
    h+='</div>';
  });
  h+='</div></div>';

  h+='<div style="text-align:center;font-size:12px;color:#888;font-weight:600">'+(calRemaining>0?calRemaining+' cal remaining':Math.abs(calRemaining)+' cal over')+'</div>';
  h+='</div>';

  if(recent.length){
    h+='<div class="meal-section-lbl">Quick add — recent foods</div>';
    h+='<div class="meal-recent-chip-row">';
    recent.forEach(function(f,i){
      h+='<button class="meal-recent-chip" onclick="mealQuickAddToFirst('+i+')">'+f.name+' · '+Math.round(f.cal)+' cal</button>';
    });
    h+='</div>';
  }

  MEAL_SECTIONS.forEach(function(sec){
    var foods=log[sec.id]||[];
    var secCal=foods.reduce(function(sum,f){return sum+(f.cal||0);},0);
    var isOpen=!!MEAL_OPEN[sec.id];
    var formOpen=!!MEAL_FORM_OPEN[sec.id];

    h+='<div class="meal-block">';
    h+='<div class="meal-block-hdr" onclick="mealToggleSection(\''+sec.id+'\')">';
    h+='<div class="meal-block-name">'+sec.label+'</div>';
    h+='<div class="meal-block-cal">'+(secCal>0?Math.round(secCal)+' cal':'—')+'</div>';
    h+='</div>';

    if(isOpen){
      h+='<div class="meal-block-body">';
      if(foods.length){
        foods.forEach(function(f){
          h+='<div class="meal-food-row">';
          h+='<div><div class="meal-food-name">'+f.name+'</div>';
          h+='<div class="meal-food-macros">P '+Math.round(f.protein||0)+'g · C '+Math.round(f.carbs||0)+'g · F '+Math.round(f.fat||0)+'g</div></div>';
          h+='<div class="meal-food-cal">'+Math.round(f.cal)+' cal</div>';
          h+='<button class="meal-food-del" onclick="mealDeleteFood(\''+sec.id+'\','+f.ts+')">✕</button>';
          h+='</div>';
        });
      } else {
        h+='<div style="font-size:12px;color:#777;font-style:italic;padding:8px 0">No foods logged yet</div>';
      }

      h+='<button class="meal-add-btn" onclick="mealToggleForm(\''+sec.id+'\')">'+(formOpen?'Cancel':'+ Add food')+'</button>';

      h+='<div class="meal-form'+(formOpen?' open':'')+'">';
      h+='<div class="meal-form-row">';
      h+='<div class="meal-form-field wide"><label>Food name</label><input type="text" id="mf_name_'+sec.id+'" placeholder="e.g. Grilled chicken breast" onkeypress="if(event.key===\'Enter\')mealSaveFood(\''+sec.id+'\')"></div>';
      h+='<div class="meal-form-field"><label>Calories</label><input type="number" inputmode="numeric" id="mf_cal_'+sec.id+'" placeholder="0"></div>';
      h+='</div>';
      h+='<div class="meal-form-row">';
      h+='<div class="meal-form-field"><label>Protein (g)</label><input type="number" inputmode="decimal" id="mf_protein_'+sec.id+'" placeholder="0"></div>';
      h+='<div class="meal-form-field"><label>Carbs (g)</label><input type="number" inputmode="decimal" id="mf_carbs_'+sec.id+'" placeholder="0"></div>';
      h+='<div class="meal-form-field"><label>Fat (g)</label><input type="number" inputmode="decimal" id="mf_fat_'+sec.id+'" placeholder="0"></div>';
      h+='</div>';
      h+='<button class="meal-form-save" onclick="mealSaveFood(\''+sec.id+'\')">Log food</button>';
      h+='</div>';

      h+='</div>';
    }
    h+='</div>';
  });

  h+='<div class="meal-goals-card">';
  h+='<div class="meal-goals-hdr">Daily goals</div>';
  h+='<div class="meal-goals-grid">';
  h+='<div class="meal-goal-field"><label>Calories</label><input type="number" inputmode="numeric" id="mg_cal" value="'+goals.cal+'" onchange="mealSaveGoals()"></div>';
  h+='<div class="meal-goal-field"><label>Protein (g)</label><input type="number" inputmode="numeric" id="mg_protein" value="'+goals.protein+'" onchange="mealSaveGoals()"></div>';
  h+='<div class="meal-goal-field"><label>Carbs (g)</label><input type="number" inputmode="numeric" id="mg_carbs" value="'+goals.carbs+'" onchange="mealSaveGoals()"></div>';
  h+='<div class="meal-goal-field"><label>Fat (g)</label><input type="number" inputmode="numeric" id="mg_fat" value="'+goals.fat+'" onchange="mealSaveGoals()"></div>';
  h+='</div></div>';

  document.getElementById('pg').innerHTML=h;
}

function mealQuickAddToFirst(idx){
  var recent=getRecentFoods();
  var food=recent[idx];
  if(!food)return;
  var dateKey=mealDateKeyForOffset(MEAL_DATE_OFFSET);
  var log=getMealLog(dateKey);
  var targetSec=MEAL_SECTIONS.find(function(sec){return MEAL_OPEN[sec.id];})||MEAL_SECTIONS[0];
  if(!log[targetSec.id])log[targetSec.id]=[];
  log[targetSec.id].push(Object.assign({},food,{ts:Date.now()}));
  saveMealLog(dateKey,log);
  MEAL_OPEN[targetSec.id]=true;
  rmeal();
}

function rstrip(){
  var h='';
  for(var i=0;i<6;i++)h+='<button class="wb'+(i===C?' on':'')+'" onclick="gt('+i+')">Week '+(i+1)+'</button>';
  document.getElementById('wstrip').innerHTML=h;
}
function sv(v){
  V=v;
  ['s','tpl','m','meal','w','e','l'].forEach(function(n){var e=document.getElementById('vt-'+n);if(e)e.className='vt'+(n===v?' on':'');});
  document.getElementById('wstrip-wrap').style.display=v==='s'?'block':'none';
  if(v==='l'){openLI();return;}
  if(v==='s')rs();else if(v==='tpl')rtpl();else if(v==='m')rm();else if(v==='meal')rmeal();else if(v==='w')rw();else rev();
}
function gt(i){C=i;rstrip();rs();}
function setwd(d){WD=d;rs();}

function openLI(){
  var scr=document.getElementById('li-screen');
  scr.classList.add('show');
  habInit();
  habRender();
}
function closeLI(){
  document.getElementById('li-screen').classList.remove('show');
  V='s';

}

/* ── HABITS ── */
var HABITS=[
  {id:'room',icon:'🧹',name:'Clean room',sub:'Make it spotless'},
  {id:'wake',icon:'⏰',name:'Wake before 8:30',sub:'Tap when you\'re up'},
  {id:'lang',icon:'🗣️',name:'Learn a language',sub:'15 minutes',target:15},
  {id:'cold',icon:'🧊',name:'Cold shower',sub:'10 seconds minimum',target:10,timer:true},
  {id:'breath',icon:'🌬️',name:'Breathwork',sub:'Box breathing session',action:'breathwork'}
];
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function habInit(){
  var last=g('hab_date');
  var today=todayStr();
  if(last!==today){
    HABITS.forEach(function(h){s('hab_done_'+h.id,'0');});
    var prevDate=last;
    if(prevDate){
      var prevAll=g('hab_all_done_'+prevDate);
      if(prevAll!=='1'){s('hab_streak','0');}
    }
    s('hab_date',today);
  }
}
function habDoneCount(){
  var c=0;
  HABITS.forEach(function(h){if(g('hab_done_'+h.id)==='1')c++;});
  return c;
}
function habToggle(id){
  var hab=HABITS.find(function(h){return h.id===id;});
  if(hab.action==='breathwork'){openBW();return;}
  if(hab.timer){habOpenColdTimer(hab);return;}
  var cur=g('hab_done_'+id);
  if(cur==='1'){
    s('hab_done_'+id,'0');
  } else {
    s('hab_done_'+id,'1');
    habCheckAllDone();
  }
  habRender();
}
function habCheckAllDone(){
  if(habDoneCount()===HABITS.length){
    var today=todayStr();
    if(g('hab_all_done_'+today)!=='1'){
      s('hab_all_done_'+today,'1');
      var newStreak=parseInt(g('hab_streak')||'0')+1;
      s('hab_streak',newStreak);
    }
  }
}
var habColdActive=null,habColdSecs=0,habColdInterval=null;
function habOpenColdTimer(hab){
  habColdActive=hab.id;
  habColdSecs=0;
  var existing=document.getElementById('hab-cold-overlay');
  if(existing)existing.remove();
  var div=document.createElement('div');
  div.id='hab-cold-overlay';
  div.style.cssText='position:fixed;inset:0;background:rgba(5,10,20,.92);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center';
  div.innerHTML='<div style="font-size:13px;color:#6a9fd0;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:14px">Cold Shower</div>'+
    '<div style="font-size:60px;font-weight:200;color:#eaf4ff;font-variant-numeric:tabular-nums" id="hab-cold-clock">0.0s</div>'+
    '<div style="font-size:12px;color:#445;margin:10px 0 26px">Target: 10 seconds</div>'+
    '<button id="hab-cold-btn" style="font-size:14px;font-weight:700;color:#0a0a0a;background:#5fc8ff;border:none;border-radius:99px;padding:13px 36px;cursor:pointer">Start</button>'+
    '<button onclick="document.getElementById(\'hab-cold-overlay\').remove();clearInterval(habColdInterval)" style="margin-top:16px;font-size:12px;color:#445;background:none;border:none;cursor:pointer">Cancel</button>';
  document.body.appendChild(div);
  document.getElementById('hab-cold-btn').onclick=function(){
    if(habColdInterval){return;}
    document.getElementById('hab-cold-btn').style.display='none';
    habColdInterval=setInterval(function(){
      habColdSecs+=0.1;
      var clk=document.getElementById('hab-cold-clock');
      if(clk)clk.textContent=habColdSecs.toFixed(1)+'s';
      if(habColdSecs>=10){
        clearInterval(habColdInterval);
        habColdInterval=null;
        s('hab_done_cold','1');
        habCheckAllDone();
        var ov=document.getElementById('hab-cold-overlay');
        if(ov){
          ov.innerHTML='<div style="font-size:40px;text-align:center;width:100%">✓</div><div style="font-size:15px;color:#9fe0c0;margin-top:10px;font-weight:600;text-align:center;width:100%">Nice work</div>';
          setTimeout(function(){ov.remove();habRender();},900);
        }
      }
    },100);
  };
}
function habRender(){
  document.getElementById('li-hab-date').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  var done=habDoneCount();
  var pct=Math.round((done/HABITS.length)*100);
  document.getElementById('li-hab-progress-fill').style.width=pct+'%';
  var streak=parseInt(g('hab_streak')||'0');
  document.getElementById('li-hab-streak-text').textContent=streak+' day streak · '+done+'/'+HABITS.length+' today';
  var h='';
  HABITS.forEach(function(hab){
    var isDone=g('hab_done_'+hab.id)==='1';
    h+='<div class="li-hab-row'+(isDone?' done':'')+'" onclick="habToggle(\''+hab.id+'\')">';
    h+='<div class="li-hab-check">✓</div>';
    h+='<div class="li-hab-icon">'+hab.icon+'</div>';
    h+='<div class="li-hab-body"><div class="li-hab-name">'+hab.name+'</div><div class="li-hab-sub">'+hab.sub+'</div></div>';
    if(!isDone&&(hab.timer||hab.action))h+='<div class="li-hab-action">'+(hab.action==='breathwork'?'Start':'Time it')+'</div>';
    h+='</div>';
  });
  document.getElementById('li-hab-list').innerHTML=h;
}

/* ── BREATHWORK ── */
var BW_PATTERNS=[
  {id:'box',name:'Box 4-4-4-4',phases:[['Breathe in',4],['Hold',4],['Breathe out',4],['Hold',4]]},
  {id:'478',name:'4-7-8',phases:[['Breathe in',4],['Hold',7],['Breathe out',8]]},
  {id:'calm',name:'Calm 5-5',phases:[['Breathe in',5],['Breathe out',5]]}
];
var bwState={patternIdx:0,cycles:6,running:false,phaseIdx:0,cycleNum:0,timeout:null,countInterval:null};
function openBW(){
  document.getElementById('bw-screen').classList.add('show');
  document.getElementById('bw-setup').style.display='block';
  document.getElementById('bw-active').style.display='none';
  document.getElementById('bw-phase-text').textContent='Ready';
  document.getElementById('bw-count').textContent='';
  document.getElementById('bw-orb').style.transition='';
  document.getElementById('bw-orb').style.transform='scale(1)';
  bwRenderPatterns();
  document.getElementById('bw-cycle-num').textContent=bwState.cycles;
}
function bwRenderPatterns(){
  var h='';
  BW_PATTERNS.forEach(function(p,i){
    h+='<button class="bw-pattern-btn'+(i===bwState.patternIdx?' sel':'')+'" onclick="bwSelectPattern('+i+')">'+p.name+'</button>';
  });
  document.getElementById('bw-patterns').innerHTML=h;
}
function bwSelectPattern(i){bwState.patternIdx=i;bwRenderPatterns();}
function bwAdjustCycles(d){
  bwState.cycles=Math.max(2,Math.min(15,bwState.cycles+d));
  document.getElementById('bw-cycle-num').textContent=bwState.cycles;
}
function bwStart(){
  bwState.running=true;
  bwState.phaseIdx=0;
  bwState.cycleNum=0;
  document.getElementById('bw-setup').style.display='none';
  document.getElementById('bw-active').style.display='flex';
  bwRenderDots();
  bwRunPhase();
}
function bwRenderDots(){
  var h='';
  for(var i=0;i<bwState.cycles;i++){h+='<div class="bw-dot'+(i<bwState.cycleNum?' filled':'')+'"></div>';}
  document.getElementById('bw-dots').innerHTML=h;
}
function bwRunPhase(){
  if(!bwState.running)return;
  var pattern=BW_PATTERNS[bwState.patternIdx];
  var phase=pattern.phases[bwState.phaseIdx];
  var label=phase[0],dur=phase[1];
  document.getElementById('bw-phase-text').textContent=label;
  var orb=document.getElementById('bw-orb');
  if(label.indexOf('in')>-1){
    orb.style.transition='transform '+dur+'s cubic-bezier(.45,0,.55,1), box-shadow '+dur+'s ease';
    orb.style.transform='scale(1.55)';
    orb.style.boxShadow='0 0 90px rgba(95,200,255,.55)';
  } else if(label.indexOf('out')>-1){
    orb.style.transition='transform '+dur+'s cubic-bezier(.45,0,.55,1), box-shadow '+dur+'s ease';
    orb.style.transform='scale(1)';
    orb.style.boxShadow='0 0 40px rgba(79,170,255,.25)';
  } else {
    orb.style.transition='transform .3s ease';
  }
  var secsLeft=dur;
  document.getElementById('bw-count').textContent=secsLeft;
  clearInterval(bwState.countInterval);
  bwState.countInterval=setInterval(function(){
    secsLeft--;
    if(secsLeft>0)document.getElementById('bw-count').textContent=secsLeft;
    else clearInterval(bwState.countInterval);
  },1000);
  bwState.timeout=setTimeout(function(){
    bwState.phaseIdx++;
    if(bwState.phaseIdx>=pattern.phases.length){
      bwState.phaseIdx=0;
      bwState.cycleNum++;
      bwRenderDots();
      if(bwState.cycleNum>=bwState.cycles){
        bwFinish();
        return;
      }
    }
    bwRunPhase();
  },dur*1000);
}
function bwFinish(){
  bwState.running=false;
  clearInterval(bwState.countInterval);
  document.getElementById('bw-phase-text').textContent='Done';
  document.getElementById('bw-count').textContent='';
  document.getElementById('bw-orb').style.transform='scale(1.15)';
  document.getElementById('bw-orb').style.boxShadow='0 0 70px rgba(95,220,180,.5)';
  s('hab_done_breath','1');
  habCheckAllDone();
  setTimeout(function(){
    bwStop();
    if(document.getElementById('li-habits-view').style.display!=='none')habRender();
  },1600);
}
function bwStop(){
  bwState.running=false;
  clearTimeout(bwState.timeout);
  clearInterval(bwState.countInterval);
  document.getElementById('bw-screen').classList.remove('show');
  document.getElementById('bw-orb').style.transition='';
  document.getElementById('bw-orb').style.transform='scale(1)';
}

rstrip();rs();
</script>
